<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Dashboard — Abunawas Percetakan & Konveksi</title>
  <meta name="theme-color" content="#2563EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="HARGA.jpg" type="image/jpeg">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <link rel="stylesheet" href="style.css">

  <style>
    /* ── Guard: sembunyikan konten sampai session diverifikasi ── */
    body { visibility: hidden; }
    body.ready { visibility: visible; }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ═══════════ TOPBAR ═══════════ -->
<div class="topbar" id="topbar">
  <div class="tbar-logo">
    <button class="btn-menu-mobile" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="tbar-mark">
      <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
    </div>
    <span>Abunawas <span style="font-weight:500;font-size:15px;color:var(--tx2)">Percetakan</span>
      <span style="font-size:12px;margin-left:4px;color:var(--blue)">✨AI</span>
    </span>
  </div>

  <div class="tbar-sp"></div>

  <!-- Theme Toggle -->
  <button class="theme-btn" onclick="toggleTheme()" id="btn-theme" title="Ganti Tema">🌙</button>

  <!-- Piutang Alert -->
  <div id="topbar-piutang" style="display:none;align-items:center;gap:6px;background:var(--red-l);border:1px solid rgba(239,68,68,0.3);border-radius:99px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:800;color:var(--red-d);" onclick="showPage('piutang')">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="topbar-piutang-label">Piutang</span>
  </div>

  <!-- User Pill -->
  <div class="upill">
    <div class="uav" id="t-av">BO</div>
    <div>
      <div style="font-size:13px;font-weight:800;color:var(--tx)" id="t-name">Memuat...</div>
      <div style="font-size:11px;color:var(--tx2);font-weight:600" id="t-role">—</div>
    </div>
  </div>

  <button class="btn btn-ghost" style="padding:8px 16px" onclick="doLogout()">Keluar</button>
</div>

<!-- ═══════════ APP BODY ═══════════ -->
<div class="app-body">

  <!-- Overlay mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar-main">
    <div id="sb-content"></div>
  </div>

  <!-- Main Content -->
  <div class="main" id="main-content">

    <!-- ════ DASHBOARD BOSS ════ -->
    <div class="page" id="pg-dashboard">
      <div class="ph">
        <div>
          <div class="pt">Dashboard</div>
          <div class="ps" id="d-date"></div>
        </div>
        <div style="display:flex;gap:8px">
          <select id="d-period" onchange="renderDash()" style="padding:10px 16px;border:1px solid var(--bdr);border-radius:10px;font-size:14px;font-weight:700;font-family:var(--fn);outline:none;background:var(--surf);color:var(--tx)">
            <option value="today">Hari ini</option>
            <option value="week">Minggu ini</option>
            <option value="month">Bulan ini</option>
            <option value="year">Tahun ini</option>
            <option value="all" selected>Semua Waktu</option>
          </select>
        </div>
      </div>

      <div style="font-size:12px;font-weight:800;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px">Ringkasan Omzet Cepat</div>
      <div class="g4" id="dash-recap-omzet" style="margin-bottom:32px"></div>

      <div style="font-size:12px;font-weight:800;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px">
        Statistik Keuangan <span id="d-stat-lbl" style="text-transform:none;font-weight:800;color:var(--blue)">(Semua Waktu)</span>
      </div>
      <div class="g4" id="d-stats" style="margin-bottom:32px"></div>

      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px" class="g2">
        <div class="card" style="margin:0">
          <div class="card-t">Grafik Penjualan</div>
          <div style="position:relative;height:220px"><canvas id="ch-bar"></canvas></div>
        </div>
        <div class="card" style="margin:0">
          <div class="card-t">Status Pembayaran</div>
          <div style="position:relative;height:220px"><canvas id="ch-pie"></canvas></div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <div class="card-t" style="margin:0">Transaksi Terbaru</div>
        </div>
        <div class="tbl-wrap" id="d-trx"></div>
      </div>
    </div>

    <!-- ════ DASHBOARD ADMIN ════ -->
    <div class="page" id="pg-dash-admin">
      <div class="ph">
        <div>
          <div class="pt">Dashboard Admin</div>
          <div class="ps">Ringkasan cepat operasional toko hari ini.</div>
        </div>
      </div>
      <div class="g2" id="da-stats" style="margin-bottom:32px"></div>
      <div class="card"><div class="card-t">10 Transaksi Terakhir</div><div class="tbl-wrap" id="da-trx"></div></div>
    </div>

    <!-- ════ HALAMAN LAINNYA (dimuat dari script.js) ════ -->
    <!-- script.js akan menyuntikkan semua halaman (transaksi, barang, laporan, dst.) -->
    <div id="dynamic-pages"></div>

  </div><!-- /main -->
</div><!-- /app-body -->

<!-- ═══════════ MODALS (diisi script.js) ═══════════ -->
<div id="modal-wrap"></div>

<!-- ═══════════ SCRIPTS ═══════════ -->
<script>
// ── Verifikasi session SEBELUM render halaman ──
(function guardSession() {
  try {
    const raw = localStorage.getItem('kasir_session');
    if (!raw) { window.location.href = 'index.html'; return; }

    const s = JSON.parse(raw);
    // Expired setelah 12 jam
    if (Date.now() - s.loginAt > 12 * 60 * 60 * 1000) {
      localStorage.removeItem('kasir_session');
      window.location.href = 'index.html';
      return;
    }

    // Tempel info user ke topbar
    document.getElementById('t-av').textContent   = s.avatar   || s.username.substring(0,2).toUpperCase();
    document.getElementById('t-name').textContent = s.name     || s.username;
    document.getElementById('t-role').textContent = labelRole(s.role);

    // Badan siap ditampilkan
    document.body.classList.add('ready');

  } catch (e) {
    window.location.href = 'index.html';
  }

  function labelRole(r) {
    return { boss:'Owner / Boss', admin:'Admin', kasir:'Kasir' }[r] || r;
  }
})();
</script>

<!-- Script utama kasir (berisi semua logika, halaman, sidebar) -->
<script src="script.js"></script>

</body>
</html>
